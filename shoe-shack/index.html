<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ============================================
         SHOE SACK — Premium Shoe Store
         ============================================ -->

    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description"
        content="SHOE SACK — Premium Shoe Store. Shop the latest sneakers, running shoes, boots, and more from top brands.">
    <title>SHOE SACK — Premium Shoe Store</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SHOE SACK">
    <link rel="apple-touch-icon" href="icons/icon.svg">

    <!-- Android Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="SHOE SACK">

    <!-- Microsoft Tile -->
    <meta name="msapplication-TileColor" content="#0a0a0a">
    <meta name="msapplication-tap-highlight" content="no">

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles (modular — imports all components via @import) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- ========== App Root ========== -->
    <div id="app-root"></div>

    <!-- ========== PWA Install Banner ========== -->
    <div class="pwa-install-banner" id="pwa-install-banner">
        <div class="pwa-icon">👟</div>
        <div class="pwa-text">
            <div class="pwa-title">Install SHOE SACK</div>
            <div class="pwa-desc">Add to home screen for the best experience</div>
        </div>
        <div class="pwa-actions">
            <button class="pwa-install-btn" id="pwa-install-btn">Install</button>
            <button class="pwa-dismiss" id="pwa-dismiss">Later</button>
        </div>
    </div>

    <!-- ========== iOS Install Instructions Modal ========== -->
    <div class="ios-install-modal" id="ios-install-modal">
        <div class="ios-install-content">
            <h3>📱 Install SHOE SACK</h3>
            <div class="ios-install-step">
                <div class="step-num">1</div>
                <span>Tap the <strong>Share</strong> button ⬆️ at the bottom of Safari</span>
            </div>
            <div class="ios-install-step">
                <div class="step-num">2</div>
                <span>Scroll down and tap <strong>"Add to Home Screen"</strong></span>
            </div>
            <div class="ios-install-step">
                <div class="step-num">3</div>
                <span>Tap <strong>"Add"</strong> to install the app</span>
            </div>
            <button class="ios-install-close" id="ios-install-close">Got it!</button>
        </div>
    </div>

    <!-- ========== Scripts ========== -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="js/app.js"></script>

    <!-- Service Worker & Install Prompt -->
    <script src="js/pwa.js"></script>
</body>

</html>
